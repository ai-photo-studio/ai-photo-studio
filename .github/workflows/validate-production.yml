name: Validate Production Endpoint
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install pillow numpy

      - name: Create test image
        run: |
          python3 -c "
          from PIL import Image
          import numpy as np, random, io
          img = Image.new('RGB', (640, 480), color=(180, 160, 140))
          arr = np.array(img)
          noise = np.random.randint(0, 30, arr.shape, dtype=np.uint8)
          arr = np.clip(arr.astype(np.int16) + noise.astype(np.int16), 0, 255).astype(np.uint8)
          for _ in range(5):
              y = np.random.randint(0, 480)
              x = np.random.randint(0, 100)
              arr[y, x:x+random.randint(10, 50)] = [255, 255, 255]
          img = Image.fromarray(arr)
          buf = io.BytesIO()
          img.save(buf, format='JPEG', quality=85)
          with open('/tmp/test_photo.jpg', 'wb') as f:
              f.write(buf.getvalue())
          import base64
          with open('/tmp/test_photo.b64', 'w') as f:
              f.write(base64.b64encode(buf.getvalue()).decode())
          print(f'Image size: {len(buf.getvalue())} bytes')
          "

      - name: Send cold-start restore request
        id: cold
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          ENDPOINT_ID: 3z633s11yn4n8q
        run: |
          B64=$(cat /tmp/test_photo.b64)
          START=$(date +%s%3N)
          curl -s -X POST "https://api.runpod.ai/v2/${ENDPOINT_ID}/runsync" \
            -H "Authorization: Bearer ${RUNPOD_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"input\":{\"action\":\"restore\",\"image\":\"data:image/jpeg;base64,${B64}\",\"file_name\":\"cold-test.jpg\"}}" \
            > /tmp/cold_response.json 2>&1
          END=$(date +%s%3N)
          echo "cold_ms=$((END - START))" >> $GITHUB_OUTPUT

      - name: Send warm-start restore request
        id: warm
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          ENDPOINT_ID: 3z633s11yn4n8q
        run: |
          B64=$(cat /tmp/test_photo.b64)
          START=$(date +%s%3N)
          curl -s -X POST "https://api.runpod.ai/v2/${ENDPOINT_ID}/runsync" \
            -H "Authorization: Bearer ${RUNPOD_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"input\":{\"action\":\"restore\",\"image\":\"data:image/jpeg;base64,${B64}\",\"file_name\":\"warm-test.jpg\"}}" \
            > /tmp/warm_response.json 2>&1
          END=$(date +%s%3N)
          echo "warm_ms=$((END - START))" >> $GITHUB_OUTPUT

      - name: Send health check
        id: health
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          ENDPOINT_ID: 3z633s11yn4n8q
        run: |
          curl -s -X POST "https://api.runpod.ai/v2/${ENDPOINT_ID}/runsync" \
            -H "Authorization: Bearer ${RUNPOD_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"input":{"action":"health"}}' \
            > /tmp/health_response.json 2>&1

      - name: Produce summary
        run: |
          echo "=== Cold Start ==="
          python3 -c "
import json
with open('/tmp/cold_response.json') as f:
    d = json.load(f)
o = d.get('output',{})
print(f'Status: {d.get(\"status\")}')
if d.get('status') == 'COMPLETED':
    print(f'Latency: {o.get(\"latency_seconds\")}s')
    print(f'Stages: {o.get(\"processing_stages\")}')
else:
    print(f'Full: {json.dumps(d, indent=2)}')
"
          echo "=== Warm Start ==="
          python3 -c "
import json
with open('/tmp/warm_response.json') as f:
    d = json.load(f)
o = d.get('output',{})
print(f'Status: {d.get(\"status\")}')
if d.get('status') == 'COMPLETED':
    print(f'Latency: {o.get(\"latency_seconds\")}s')
    print(f'Stages: {o.get(\"processing_stages\")}')
else:
    print(f'Full: {json.dumps(d, indent=2)}')
"
          echo "=== Health ==="
          python3 -c "
import json
with open('/tmp/health_response.json') as f:
    d = json.load(f)
o = d.get('output',{})
print(f'Status: {d.get(\"status\")}')
if d.get('status') == 'COMPLETED':
    print(f'Device: {o.get(\"device\")}')
    print(f'GPU: {o.get(\"gpu_name\")}')
    print(f'VRAM: {o.get(\"vram_total_gb\")} GB')
    print(f'Models: {o.get(\"models_loaded\")}')
    missing=[k for k,v in (o.get('models_loaded') or {}).items() if not v]
    print(f'PIL FALLBACK: {\"YES - \" + str(missing) if missing else \"NO\"}')
else:
    print(f'Full: {json.dumps(d, indent=2)}')
"
          echo "=== PASS RATE ==="
          python3 -c "
import json
d1=json.load(open('/tmp/cold_response.json'))
d2=json.load(open('/tmp/warm_response.json'))
dh=json.load(open('/tmp/health_response.json'))
ok=0; total=4
if d1.get('status')=='COMPLETED': ok+=1
if d2.get('status')=='COMPLETED': ok+=1
if dh.get('status')=='COMPLETED': ok+=1
ho=dh.get('output',{})
if all(ho.get('models_loaded',{}).values()): ok+=1
print(f'{ok}/{total}')
if ok==4: print('GO FOR PRODUCTION')
else: print(f'ISSUES: {4-ok} checks failed')
"
