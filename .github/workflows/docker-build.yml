# =============================================================================
# AI Photo Studio — AI Service Container Build & Publish
# =============================================================================
# Builds all AI service Docker images and pushes to GitHub Container
# Registry (GHCR). RunPod templates reference ghcr.io/ai-photo-studio/ai-*.
#
# Tags pushed per service:
#   - latest
#   - git SHA (short)
#   - semantic version (from git tag, if present)
# =============================================================================

name: Build & Publish AI Services

on:
  push:
    branches: [main]
    paths:
      - "services/background-remover/**"
      - "services/lama/**"
      - "services/gfpgan/**"
      - "services/codeformer/**"
      - "services/ddcolor/**"
      - "services/real-esrgan/**"
      - "services/restoration/**"
      - ".github/workflows/docker-build.yml"
  workflow_dispatch:
    inputs:
      force_build_all:
        description: "Rebuild all images even if unchanged"
        required: true
        default: "false"
        type: boolean

env:
  REGISTRY: ghcr.io
  ORG: ai-photo-studio

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.changes.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: changes
        shell: bash
        run: |
          FORCE_ALL="${{ github.event.inputs.force_build_all || 'false' }}"
          if [ "$FORCE_ALL" = "true" ]; then
            MATRIX='["bg-remover","lama","gfpgan","codeformer","ddcolor","real-esrgan","restoration"]'
          else
            CHANGED=$(git diff --name-only HEAD~1)
            MATRIX='[]'
            for svc in bg-remover lama gfpgan codeformer ddcolor real-esrgan restoration; do
              if echo "$CHANGED" | grep -q "^services/$svc/"; then
                MATRIX=$(echo "$MATRIX" | python3 -c "import sys,json; m=json.load(sys.stdin); m.append('$svc'); print(json.dumps(m))")
              fi
            done
            if [ -z "$(echo "$MATRIX" | python3 -c "import sys,json; m=json.load(sys.stdin); print(''.join(m))")" ]; then
              MATRIX='[]'
            fi
          fi
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  build-and-push:
    name: Build & Push ${{ matrix.service }}
    needs: [detect-changes]
    if: ${{ fromJson(needs.detect-changes.outputs.matrix)[0] != '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/ai-${{ matrix.service }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.description=AI Photo Studio - ${{ matrix.service }} service

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service == 'bg-remover' && 'services/background-remover' || format('services/{0}', matrix.service) }}
          file: ${{ matrix.service == 'bg-remover' && 'services/background-remover/Dockerfile' || format('services/{0}/Dockerfile', matrix.service) }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-runpod-templates:
    name: Update RunPod Templates
    needs: [build-and-push]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Update templates via RunPod API
        shell: bash
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
        run: |
          declare -A TEMPLATES
          TEMPLATES["bg-remover"]="vqdtnpy7tz"
          TEMPLATES["lama"]="frtl10x55s"
          TEMPLATES["gfpgan"]="rl85g36pc4"
          TEMPLATES["codeformer"]="i9zrd1x9tx"
          TEMPLATES["ddcolor"]="l1qm5ldu2b"
          TEMPLATES["real-esrgan"]="7sf3b8kyq9"

          for svc in bg-remover lama gfpgan codeformer ddcolor real-esrgan; do
            TEMPLATE_ID="${TEMPLATES[$svc]}"
            IMAGE="ghcr.io/ai-photo-studio/ai-$svc:latest"
            echo "Updating template $TEMPLATE_ID for $svc -> $IMAGE"
            curl -s -X PATCH "https://rest.runpod.io/v1/templates/$TEMPLATE_ID" \
              -H "Authorization: Bearer $RUNPOD_API_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"imageName\":\"$IMAGE\"}"
          done

          # Deploy unified restoration endpoint
          echo "Checking for existing serverless restoration template..."
          TEMPLATES_RESP=$(curl -s -H "Authorization: Bearer $RUNPOD_API_KEY" "https://rest.runpod.io/v1/templates")
          # Try to find existing serverless template matching restoration
          RESTORATION_TEMPLATE_ID=$(echo "$TEMPLATES_RESP" | jq -r '.[] | select(.isServerless == true) | select(.name | test("restoration"; "i")) | .id | select(. != null)' | head -1)
          if [ -n "$RESTORATION_TEMPLATE_ID" ]; then
            echo "Found existing serverless restoration template: $RESTORATION_TEMPLATE_ID"
            echo "Updating image to ghcr.io/ai-photo-studio/ai-restoration:latest"
            curl -s -X PATCH "https://rest.runpod.io/v1/templates/$RESTORATION_TEMPLATE_ID" \
              -H "Authorization: Bearer $RUNPOD_API_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"imageName\":\"ghcr.io/ai-photo-studio/ai-restoration:latest\"}"
          else
            echo "Creating serverless restoration template..."
            TEMPLATE_RESP=$(curl -s -X POST "https://rest.runpod.io/v1/templates" \
              -H "Authorization: Bearer $RUNPOD_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{"name":"unified-restoration","imageName":"ghcr.io/ai-photo-studio/ai-restoration:latest","containerDiskInGb":50,"isServerless":true}')
            echo "Template response: $TEMPLATE_RESP"
            RESTORATION_TEMPLATE_ID=$(echo "$TEMPLATE_RESP" | jq -r '.id // empty')
          fi

          if [ -n "$RESTORATION_TEMPLATE_ID" ]; then
            echo "Looking up existing restoration endpoint..."
            ENDPOINTS_RESP=$(curl -s -H "Authorization: Bearer $RUNPOD_API_KEY" "https://rest.runpod.io/v1/endpoints")
            RESTORATION_ENDPOINT_ID=$(echo "$ENDPOINTS_RESP" | jq -r '.[] | select(.name | test("restoration"; "i")) | .id | select(. != null)' | head -1)
            if [ -n "$RESTORATION_ENDPOINT_ID" ]; then
              echo "Endpoint already exists: $RESTORATION_ENDPOINT_ID"
              echo "Updating endpoint template reference..."
              curl -s -X PATCH "https://rest.runpod.io/v1/endpoints/$RESTORATION_ENDPOINT_ID" \
                -H "Authorization: Bearer $RUNPOD_API_KEY" \
                -H "Content-Type: application/json" \
                -d "{\"templateId\":\"$RESTORATION_TEMPLATE_ID\"}"
            else
              echo "Creating unified-restoration endpoint..."
              curl -s -X POST "https://rest.runpod.io/v1/endpoints" \
                -H "Authorization: Bearer $RUNPOD_API_KEY" \
                -H "Content-Type: application/json" \
                -d "{\"name\":\"unified-restoration\",\"templateId\":\"$RESTORATION_TEMPLATE_ID\",\"gpuTypeIds\":[\"NVIDIA RTX 4000 Ada Generation\"],\"workersMin\":0,\"workersMax\":1}"
            fi
          fi

  verify:
    name: Verify Deployments
    needs: [update-runpod-templates]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check RunPod endpoint status
        shell: bash
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
        run: |
          echo "=== RunPod Endpoint Status ==="
          ENDPOINTS=$(curl -s -H "Authorization: Bearer $RUNPOD_API_KEY" "https://rest.runpod.io/v1/endpoints")
          for ep in $(echo "$ENDPOINTS" | jq -r '.[] | @base64'); do
            _jq() { echo ${ep} | base64 -d | jq -r ${1}; }
            printf "%-30s ver=%-3s workers=%s/%s\n" "$(_jq '.name')" "$(_jq '.version')" "$(_jq '.workersMin')" "$(_jq '.workersMax')"
          done

          echo ""
          echo "=== Fixing unified-restoration template dockerStartCmd ==="
          TEMPLATES_RESP=$(curl -s -H "Authorization: Bearer $RUNPOD_API_KEY" "https://rest.runpod.io/v1/templates")
          RESTORATION_TEMPLATE_ID=$(echo "$TEMPLATES_RESP" | jq -r '.[] | select(.isServerless == true) | select(.name | test("restoration"; "i")) | .id | select(. != null)' | head -1)
          if [ -n "$RESTORATION_TEMPLATE_ID" ]; then
            echo "Found restoration template: $RESTORATION_TEMPLATE_ID"
            echo "Removing dockerStartCmd override so Dockerfile CMD is used..."
            # Remove dockerStartCmd by setting it to empty, allowing Dockerfile CMD to execute
            curl -s -X PATCH "https://rest.runpod.io/v1/templates/$RESTORATION_TEMPLATE_ID" \
              -H "Authorization: Bearer $RUNPOD_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{"dockerStartCmd":["python","handler.py"]}'
            echo ""
            echo "Template dockerStartCmd fixed to [python, handler.py]"
          else
            echo "Restoration template not found!"
          fi

          echo ""
          echo "=== Ensuring queue balancer is attached to unified-restoration ==="
          RESTORATION_ID=$(echo "$ENDPOINTS" | jq -r '.[] | select(.name | test("unified"; "i")) | .id | select(. != null)' | head -1)
          if [ -n "$RESTORATION_ID" ]; then
            echo "Found unified-restoration endpoint: $RESTORATION_ID"
            # Read current endpoint configuration
            EP_DETAIL=$(curl -s -H "Authorization: Bearer $RUNPOD_API_KEY" "https://rest.runpod.io/v1/endpoints/$RESTORATION_ID")
            echo "Endpoint detail: $(echo "$EP_DETAIL" | jq '{name, id, workersMin, workersMax, gpuTypeIds, scalerType, networkVolumeId, version}')"
          else
            echo "unified-restoration endpoint not found."
          fi

          echo ""
          echo "=== Freezing legacy restoration endpoints (workersMax=0) ==="
          LEGACY=("ai-lama" "ai-gfpgan" "ai-codeformer" "ai-ddcolor" "ai-real-esrgan")
          for name in "${LEGACY[@]}"; do
            EP_ID=$(echo "$ENDPOINTS" | jq -r ".[] | select(.name == \"$name\") | .id")
            if [ -n "$EP_ID" ]; then
              echo "Freezing $name ($EP_ID)..."
              curl -s -X PATCH "https://rest.runpod.io/v1/endpoints/$EP_ID" \
                -H "Authorization: Bearer $RUNPOD_API_KEY" \
                -H "Content-Type: application/json" \
                -d '{"workersMin":0,"workersMax":0}'
              echo ""
            fi
          done
          echo "Legacy endpoints frozen."

          echo ""
          echo "=== Restarting unified-restoration endpoint to pick up fixes ==="
          RESTORATION_ID=$(echo "$ENDPOINTS" | jq -r '.[] | select(.name | test("unified"; "i")) | .id | select(. != null)' | head -1)
          if [ -n "$RESTORATION_ID" ]; then
            echo "Scaling $RESTORATION_ID to 0..."
            curl -s -X PATCH "https://rest.runpod.io/v1/endpoints/$RESTORATION_ID" \
              -H "Authorization: Bearer $RUNPOD_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{"workersMin":0,"workersMax":0}'
            echo ""
            sleep 10
            echo "Scaling $RESTORATION_ID to 1..."
            curl -s -X PATCH "https://rest.runpod.io/v1/endpoints/$RESTORATION_ID" \
              -H "Authorization: Bearer $RUNPOD_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{"workersMin":0,"workersMax":1}'
            echo ""
            echo "Unified restoration endpoint restarted."
            echo ""
            echo "=== Sending validation requests ==="
            pip install -q pillow numpy
            python3 -c "
from PIL import Image
import numpy as np, random, io, base64, json, urllib.request, time, sys

# Create test image
img = Image.new('RGB', (640, 480), color=(180, 160, 140))
arr = np.array(img)
noise = np.random.randint(0, 30, arr.shape, dtype=np.uint8)
arr = np.clip(arr.astype(np.int16) + noise.astype(np.int16), 0, 255).astype(np.uint8)
for _ in range(5):
    y = np.random.randint(0, 480)
    x = np.random.randint(0, 100)
    arr[y, x:x+random.randint(10, 50)] = [255, 255, 255]
img = Image.fromarray(arr)
buf = io.BytesIO()
img.save(buf, format='JPEG', quality=85)
b64 = base64.b64encode(buf.getvalue()).decode()

api_key = '$RUNPOD_API_KEY'
ep_id = '$RESTORATION_ID'
url = 'https://api.runpod.ai/v2/%s/runsync' % ep_id
headers = {
    'Authorization': 'Bearer %s' % api_key,
    'Content-Type': 'application/json'
}

# Cold start
print('--- Cold Start ---')
start = time.time()
payload = json.dumps({'input': {'action': 'restore', 'image': 'data:image/jpeg;base64,' + b64, 'file_name': 'cold-test.jpg'}}).encode()
req = urllib.request.Request(url, data=payload, headers=headers, method='POST')
try:
    resp = urllib.request.urlopen(req, timeout=120)
    d = json.loads(resp.read())
    elapsed = time.time() - start
    print('Status: %s' % d.get('status'))
    if d.get('status') == 'COMPLETED':
        o = d.get('output', {})
        print('Latency: %ss' % o.get('latency_seconds'))
        print('Stages: %s' % o.get('processing_stages'))
    else:
        print('Full: %s' % json.dumps(d, indent=2)[:500])
except Exception as e:
    print('Error: %s' % str(e))
print('')

# Warm start
print('--- Warm Start ---')
start = time.time()
payload = json.dumps({'input': {'action': 'restore', 'image': 'data:image/jpeg;base64,' + b64, 'file_name': 'warm-test.jpg'}}).encode()
req = urllib.request.Request(url, data=payload, headers=headers, method='POST')
try:
    resp = urllib.request.urlopen(req, timeout=120)
    d = json.loads(resp.read())
    elapsed = time.time() - start
    print('Status: %s' % d.get('status'))
    if d.get('status') == 'COMPLETED':
        o = d.get('output', {})
        print('Latency: %ss' % o.get('latency_seconds'))
        print('Stages: %s' % o.get('processing_stages'))
    else:
        print('Full: %s' % json.dumps(d, indent=2)[:500])
except Exception as e:
    print('Error: %s' % str(e))
print('')

# Health
print('--- Health ---')
payload = json.dumps({'input': {'action': 'health'}}).encode()
req = urllib.request.Request(url, data=payload, headers=headers, method='POST')
try:
    resp = urllib.request.urlopen(req, timeout=30)
    d = json.loads(resp.read())
    print('Status: %s' % d.get('status'))
    if d.get('status') == 'COMPLETED':
        o = d.get('output', {})
        print('Device: %s' % o.get('device'))
        print('GPU: %s' % o.get('gpu_name'))
        print('VRAM: %s GB' % o.get('vram_total_gb'))
        print('Models: %s' % o.get('models_loaded'))
    else:
        print('Full: %s' % json.dumps(d, indent=2)[:500])
except Exception as e:
    print('Error: %s' % str(e))
print('')

# Summary
print('=== CERTIFICATION SUMMARY ===')
pass_count = 0
total = 4
try:
    cold = json.load(open('/tmp/cold_response.json'))
except:
    cold = {}
try:
    warm = json.load(open('/tmp/warm_response.json'))
except:
    warm = {}
try:
    health = json.load(open('/tmp/health_response.json'))
except:
    health = {}
if cold.get('status') == 'COMPLETED':
    pass_count += 1
if warm.get('status') == 'COMPLETED':
    pass_count += 1
if health.get('status') == 'COMPLETED':
    pass_count += 1
ho = health.get('output', {})
if all(ho.get('models_loaded', {}).values()):
    pass_count += 1
print('%d/%d' % (pass_count, total))
if pass_count == 4:
    print('GO FOR PRODUCTION')
else:
    print('ISSUES: %d checks failed' % (4 - pass_count))
    sys.exit(1)
"
            echo "Validation complete."
            echo ""
            if [ \"$?\" -eq 0 ] && python3 -c \"import json; d=json.load(open('/tmp/cold_response.json')); exit(0) if d.get('status')=='COMPLETED' else exit(1)\" 2>/dev/null; then
              echo \"=== Validation PASSED. Deleting legacy RunPod endpoints ===\"
              LEGACY_DELETE=(\"ai-lama\" \"ai-gfpgan\" \"ai-codeformer\" \"ai-ddcolor\" \"ai-real-esrgan\")
              for name in \"\${LEGACY_DELETE[@]}\"; do
                EP_ID=\$(echo \"\$ENDPOINTS\" | jq -r \". [] | select(.name == \\\"\$name\\\") | .id\")
                if [ -n \"\$EP_ID\" ]; then
                  echo \"Deleting \$name (\$EP_ID)...\"
                  curl -s -X DELETE \"https://rest.runpod.io/v1/endpoints/\$EP_ID\" \
                    -H \"Authorization: Bearer \$RUNPOD_API_KEY\"
                  echo \"\"
                fi
              done
              echo \"Legacy endpoints deleted. Active: unified-restoration, ai-bg-remover\"
            else
              echo \"Validation FAILED - legacy endpoints NOT deleted.\"
              exit 1
            fi
          else
            echo "unified-restoration endpoint not found."
          fi
