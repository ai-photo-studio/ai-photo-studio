# =============================================================================
# AI Photo Studio — Production Deployment Workflow
# =============================================================================
# TARGET:    https://www.thannow.com (frontend)
#            https://api.thannow.com (API)
# PLATFORM:  Northflank (backend API) — Neon PostgreSQL + Upstash Redis + R2
# SECRETS:   All credentials via GitHub Secrets only / Northflank secrets
# TRIGGER:   Auto-deploy via Northflank GitHub integration on push to main
# =============================================================================
#
# DEPLOYMENT ARCHITECTURE:
#   GitHub Actions:     Build + push Docker image to GHCR
#   Northflank:         Auto-deploys from GHCR when main branch updates
#                       (GitHub integration handles the deploy trigger)
#   Cloudflare Pages:   Frontend hosting (unchanged)
# =============================================================================

name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment target"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

  # push:
  #   branches: [main]
  #   paths-ignore:
  #     - "**.md"
  #     - "docs/**"
  #     - ".kilo/**"

env:
  NODE_VERSION: "24"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/ai-api

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma@5.20.0 generate --schema apps/api/prisma/schema.prisma

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

  build-and-push:
    name: Build & Push API Image
    needs: [verify]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/ai-api
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-api:
    name: Trigger Northflank Deploy
    needs: [build-and-push]
    runs-on: ubuntu-latest
    steps:
      - name: Northflank auto-deploy (GitHub integration)
        run: |
          echo "Northflank is configured via GitHub integration."
          echo "Auto-deploy triggers on every push to main branch."
          echo "No manual deploy trigger needed — Northflank monitors the repository."
        # Note: Northflank's GitHub integration watches the repo for pushes to main.
        # When a new GHCR image is pushed by the build-and-push job, the subsequent
        # push to main (or the same commit that triggered this workflow) causes
        # Northflank to pull the new image and deploy it automatically.
        #
        # If Northflank needs an explicit webhook trigger, add:
        #   - name: Trigger Northflank Deploy
        #     run: |
        #       curl -X POST https://api.northflank.com/v1/projects/ai-photo-studio/services/ai-photo-studio-api/deploy \
        #         -H "Authorization: Bearer ${{ secrets.NORTHFLANK_API_TOKEN }}"

  deploy-frontend:
    name: Deploy Frontend
    needs: [verify]
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    concurrency: production
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=ai-photo-studio-frontend

  post-deploy-verify:
    name: Post-Deploy Verification
    needs: [deploy-api, deploy-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Verify API health
        run: |
          HEALTH_URL="https://api.thannow.com/api/health"
          echo "Checking API health at $HEALTH_URL"
          curl -sf -o /dev/null -w "HTTP %{http_code}\n" "$HEALTH_URL" || echo "API health check failed"
          # Direct Northflank URL can also be verified once available:
          # curl -sf -o /dev/null -w "HTTP %{http_code}\n" "https://ai-photo-studio-api.northflank.app/api/health"

      - name: Verify frontend
        run: |
          echo "Checking frontend at https://www.thannow.com"
          curl -sf -o /dev/null -w "HTTP %{http_code}\n" "https://www.thannow.com" || echo "Frontend check failed"