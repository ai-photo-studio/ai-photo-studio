# =============================================================================
# AI Photo Studio — Production Deployment Workflow
# =============================================================================
# TARGET:    https://www.thannow.com (frontend)
#            https://api.thannow.com (API)
# PLATFORM:  Cloud Run (backend API) — Neon PostgreSQL + Upstash Redis + R2
# SECRETS:   All credentials via GitHub Secrets only
# TRIGGER:   Manual (workflow_dispatch) or push to main (uncomment to enable)
# =============================================================================

name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment target"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

  # push:
  #   branches: [main]
  #   paths-ignore:
  #     - "**.md"
  #     - "docs/**"
  #     - ".kilo/**"

env:
  NODE_VERSION: "24"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/ai-api

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma@5.20.0 generate --schema apps/api/prisma/schema.prisma

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

  build-and-push:
    name: Build & Push API Image
    needs: [verify]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/ai-api
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-api:
    name: Deploy API to Cloud Run
    needs: [build-and-push]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: ${{ github.event.inputs.environment || 'production' }}
    concurrency: production
    steps:
      - uses: actions/checkout@v4

      - name: Generate Prisma client
        run: npx prisma@5.20.0 generate --schema apps/api/prisma/schema.prisma

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          project_id: project-9540c255-c960-4fa0-a91
          workload_identity_provider: projects/108335160641/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions-deploy@project-9540c255-c960-4fa0-a91.iam.gserviceaccount.com

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          image: us-central1-docker.pkg.dev/project-9540c255-c960-4fa0-a91/ai-photo-studio-api/latest
          service: ai-photo-studio-api
          region: us-central1
          project_id: project-9540c255-c960-4fa0-a91
          timeout: 300
          flags: --allow-unauthenticated --memory=512Mi --cpu=1 --concurrency=80
          env_vars: |
            ALLOWED_ORIGINS=https://www.thannow.com
            AI_PROVIDER=local-rembg
            STORAGE_PROVIDER=r2
            DELIVERY_MODE=WHATSAPP
            PAYMENT_GATEWAY_NAME=manual
            RESTORATION_ENDPOINT_URL=3z633s11yn4n8q
            R2_ACCOUNT_ID=${{ secrets.R2_ACCOUNT_ID }}
            R2_PUBLIC_BASE_URL=${{ secrets.R2_PUBLIC_BASE_URL }}
          secrets: |
            JWT_SECRET=JWT_SECRET:latest
            ADMIN_JWT_SECRET=ADMIN_JWT_SECRET:latest
            DATABASE_URL=DATABASE_URL:latest
            REDIS_URL=REDIS_URL:latest
            R2_BUCKET_NAME=R2_BUCKET:latest

  deploy-frontend:
    name: Deploy Frontend
    needs: [verify]
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    concurrency: production
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=ai-photo-studio-frontend

  post-deploy-verify:
    name: Post-Deploy Verification
    needs: [deploy-api, deploy-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Verify API health
        run: |
          HEALTH_URL="https://ai-photo-studio-api-108335160641.us-central1.run.app/api/health"
          echo "Checking API health at $HEALTH_URL"
          curl -sf -o /dev/null -w "HTTP %{http_code}\n" "$HEALTH_URL" || echo "API health check failed"

      - name: Verify frontend
        run: |
          echo "Checking frontend at https://www.thannow.com"
          curl -sf -o /dev/null -w "HTTP %{http_code}\n" "https://www.thannow.com" || echo "Frontend check failed"