steps:
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/ai-photo-studio-api/bg-remover:$BUILD_NUMBER', '.']
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/ai-photo-studio-api/bg-remover:$BUILD_NUMBER']
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
  - 'run'
  - 'deploy'
  - 'ai-photo-studio-bg-remover'
  - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/ai-photo-studio-api/bg-remover:$BUILD_NUMBER'
  - '--region=us-central1'
  - '--project=$PROJECT_ID'
  - '--platform=managed'
  - '--allow-unauthenticated'
  - '--port=8000'
  - '--cpu=2'
  - '--memory=2Gi'
  - '--timeout=300s'
  - '--min-instances=0'
  - '--max-instances=1'
  - '--set-env-vars=REMBG_MODEL=u2net'
images:
- 'us-central1-docker.pkg.dev/$PROJECT_ID/ai-photo-studio-api/bg-remover:$BUILD_NUMBER'
options:
  logging: CLOUD_LOGGING_ONLY